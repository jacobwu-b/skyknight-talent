  <path d="M 34 44 Q 42 20 60 22 Q 78 20 86 44 Q 72 36 60 38 Q 48 36 34 44 Z" fill="#2d1b00"/>
  <path d="M 34 44 Q 30 56 32 68" stroke="#2d1b00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 86 44 Q 90 56 88 68" stroke="#2d1b00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Bindi -->
  <circle cx="60" cy="50" r="2.5" fill="#db2777"/>
  <!-- Eyes — large bright -->
  <ellipse cx="48" cy="62" rx="7.5" ry="8" fill="white"/>
  <ellipse cx="72" cy="62" rx="7.5" ry="8" fill="white"/>
  <circle cx="49" cy="63" r="5.5" fill="#1a1a2e"/>
  <circle cx="73" cy="63" r="5.5" fill="#1a1a2e"/>
  <circle cx="49" cy="63" r="2.5" fill="#db2777"/>
  <circle cx="73" cy="63" r="2.5" fill="#db2777"/>
  <circle cx="51" cy="61" r="1.5" fill="white"/>
  <circle cx="75" cy="61" r="1.5" fill="white"/>
  <!-- Eyebrows -->
  <path d="M 41 53 Q 48 50 55 53" stroke="#2d1b00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 65 53 Q 72 50 79 53" stroke="#2d1b00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="60" cy="72" rx="2" ry="1.5" fill="#a06030"/>
