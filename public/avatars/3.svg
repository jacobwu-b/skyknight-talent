<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Eleanor Cho — Partner -->
  <circle cx="60" cy="60" r="60" fill="#7c3aed"/>
  <!-- Hair back — long silver-white -->
  <ellipse cx="60" cy="45" rx="30" ry="28" fill="#d4d4d8"/>
  <rect x="30" y="55" width="10" height="30" rx="5" fill="#d4d4d8"/>
  <rect x="80" y="55" width="10" height="30" rx="5" fill="#d4d4d8"/>
  <!-- Face -->
  <ellipse cx="60" cy="67" rx="25" ry="27" fill="#FDDBB4"/>
  <!-- Hair front — elegant parted -->
  <path d="M 32 42 Q 40 20 60 24 Q 80 20 88 42 Q 72 34 60 36 Q 48 34 32 42 Z" fill="#d4d4d8"/>
  <path d="M 32 42 Q 30 50 32 58" stroke="#d4d4d8" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 88 42 Q 90 50 88 58" stroke="#d4d4d8" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Eyes — large elegant -->
  <ellipse cx="48" cy="61" rx="7.5" ry="8" fill="white"/>
  <ellipse cx="72" cy="61" rx="7.5" ry="8" fill="white"/>
  <circle cx="49" cy="62" r="5.5" fill="#1a1a2e"/>
  <circle cx="73" cy="62" r="5.5" fill="#1a1a2e"/>
  <circle cx="49" cy="62" r="2.5" fill="#7c3aed"/>
  <circle cx="73" cy="62" r="2.5" fill="#7c3aed"/>
  <circle cx="51" cy="60" r="1.5" fill="white"/>
  <circle cx="75" cy="60" r="1.5" fill="white"/>
  <!-- Lashes -->
  <path d="M 41 55 L 40 52" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 44 53 L 44 50" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 65 55 L 64 52" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 68 53 L 68 50" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Eyebrows — delicate -->
  <path d="M 41 52 Q 48 49 55 52" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 65 52 Q 72 49 79 52" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="60" cy="71" rx="2" ry="1.5" fill="#e8a580"/>
  <!-- Mouth — gentle smile -->
  <path d="M 52 79 Q 60 84 68 79" stroke="#c07060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="41" cy="73" rx="6" ry="3" fill="#ffb3ba" opacity="0.5"/>
  <ellipse cx="79" cy="73" rx="6" ry="3" fill="#ffb3ba" opacity="0.5"/>
</svg>
