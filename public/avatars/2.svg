  <!-- Hair back — wavy dark brown -->
  <ellipse cx="60" cy="40" rx="30" ry="26" fill="#3d1f0a"/>
  <!-- Face -->
  <ellipse cx="60" cy="67" rx="25" ry="27" fill="#c68642"/>
  <!-- Hair top — swept side part -->
  <path d="M 30 42 Q 38 22 70 26 Q 88 28 90 42 Q 76 36 60 38 Q 44 36 30 42 Z" fill="#3d1f0a"/>
  <path d="M 30 42 Q 28 52 30 60 Q 28 54 30 42 Z" fill="#3d1f0a"/>
  <path d="M 90 42 Q 92 52 90 60 Q 92 54 90 42 Z" fill="#3d1f0a"/>
  <!-- Side locks -->
  <ellipse cx="34" cy="60" rx="6" ry="12" fill="#3d1f0a"/>
  <ellipse cx="86" cy="60" rx="6" ry="12" fill="#3d1f0a"/>
  <!-- Eyes -->
  <ellipse cx="48" cy="61" rx="7" ry="7.5" fill="white"/>
  <ellipse cx="72" cy="61" rx="7" ry="7.5" fill="white"/>
  <circle cx="49" cy="62" r="5" fill="#1a1a2e"/>
  <circle cx="73" cy="62" r="5" fill="#1a1a2e"/>
  <circle cx="49" cy="62" r="2.5" fill="#0891b2"/>
  <circle cx="73" cy="62" r="2.5" fill="#0891b2"/>
  <circle cx="51" cy="60" r="1.5" fill="white"/>
  <circle cx="75" cy="60" r="1.5" fill="white"/>
  <!-- Eyebrows — confident arch -->
  <path d="M 41 52 Q 48 49 55 52" stroke="#3d1f0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 65 52 Q 72 49 79 52" stroke="#3d1f0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 58 70 Q 60 73 62 70" stroke="#a06030" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth — confident smile -->
  <path d="M 51 80 Q 60 86 69 80" stroke="#8b4030" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="41" cy="72" rx="6" ry="3" fill="#ffb3ba" opacity="0.4"/>
  <ellipse cx="79" cy="72" rx="6" ry="3" fill="#ffb3ba" opacity="0.4"/>
