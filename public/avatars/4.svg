<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Diego Hernández — Associate -->
  <circle cx="60" cy="60" r="60" fill="#059669"/>
  <!-- Hair back -->
  <ellipse cx="60" cy="40" rx="30" ry="26" fill="#1a1a2e"/>
  <!-- Face -->
  <ellipse cx="60" cy="67" rx="25" ry="27" fill="#c68642"/>
  <!-- Spiky hair top -->
  <path d="M 34 44 Q 36 24 44 20 Q 46 32 48 30 Q 52 18 56 22 Q 57 34 60 28 Q 63 18 68 22 Q 70 34 74 30 Q 76 18 86 24 Q 88 34 86 44 Z" fill="#1a1a2e"/>
  <!-- Side hair -->
  <ellipse cx="34" cy="60" rx="6" ry="14" fill="#1a1a2e"/>
  <ellipse cx="86" cy="60" rx="6" ry="14" fill="#1a1a2e"/>
  <!-- Eyes — energetic wide -->
  <ellipse cx="47" cy="61" rx="8" ry="8.5" fill="white"/>
  <ellipse cx="73" cy="61" rx="8" ry="8.5" fill="white"/>
  <circle cx="48" cy="62" r="6" fill="#1a1a2e"/>
  <circle cx="74" cy="62" r="6" fill="#1a1a2e"/>
  <circle cx="48" cy="62" r="3" fill="#059669"/>
  <circle cx="74" cy="62" r="3" fill="#059669"/>
  <circle cx="50" cy="60" r="1.8" fill="white"/>
  <circle cx="76" cy="60" r="1.8" fill="white"/>
  <!-- Eyebrows — raised expressive -->
  <path d="M 39 50 Q 47 46 55 50" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 65 50 Q 73 46 81 50" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 57 71 Q 60 74 63 71" stroke="#a06030" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth — big grin -->
  <path d="M 49 80 Q 60 90 71 80" stroke="#8b4030" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 49 80 Q 60 88 71 80" stroke="#FDDBB4" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Blush -->
  <ellipse cx="40" cy="72" rx="6" ry="3" fill="#ffb3ba" opacity="0.5"/>
  <ellipse cx="80" cy="72" rx="6" ry="3" fill="#ffb3ba" opacity="0.5"/>
</svg>
