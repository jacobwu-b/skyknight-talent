name: Tech debt
description: Something the agent or a human noticed but did not fix
labels: ["tech-debt"]
body:
  - type: textarea
    id: where
    attributes:
      label: Where
      description: File path(s), function names, or component.
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What's wrong
      description: Be concrete. "Bad" is not a problem statement.
    validations:
      required: true
  - type: textarea
    id: why_now
    attributes:
      label: Why this matters now
      description: What does this debt cost us? Bugs? Slow reviews? Onboarding pain?
    validations:
      required: true
  - type: textarea
    id: shape
    attributes:
      label: Shape of the fix
      description: Rough approach. Not a plan. Optional.
  - type: input
    id: surfaced_in
    attributes:
      label: Surfaced in
      description: PR or commit where this was noticed.
