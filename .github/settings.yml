# Applied automatically by the Probot Settings app
# (https://github.com/apps/settings) on every push to main.
#
# This file mirrors the settings documented in repo-settings.md.
# When you change one, change the other in the same PR.

repository:
  default_branch: main
  has_issues: true
  has_projects: true
  has_wiki: false
  has_discussions: false
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  allow_auto_merge: true
  delete_branch_on_merge: true
  squash_merge_commit_title: PR_TITLE
  squash_merge_commit_message: PR_BODY

labels:
  - name: bug
    color: d73a4a
    description: Broken behavior
  - name: tech-debt
    color: fbca04
    description: Out-of-scope cleanup or fragility surfaced during work
  - name: feature
    color: 0e8a16
    description: New capability or behavior change
  - name: spec-needed
    color: 5319e7
    description: Cannot start until a spec exists in docs/specs/
  - name: blocked
    color: b60205
    description: Cannot proceed; needs a decision or external action

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: true
      required_status_checks:
        strict: true
        contexts:
          - Lint
          - Types
          - Test
          - Build
          - Secret scan
          # - Evals     # uncomment once eval job is enabled
          # - Analyze   # CodeQL — uncomment once language matrix is set
      required_conversation_resolution: true
      required_linear_history: true
      enforce_admins: true
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false
      required_signatures: true
