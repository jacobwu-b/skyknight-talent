version: 2

# Group minor + patch updates into a single PR per ecosystem per week.
# Major bumps stay separate — CLAUDE.md §6 requires changelog review.

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

