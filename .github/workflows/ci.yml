# CI — required checks for every PR.
#
# These job names must match the required status checks configured in
# .github/repo-settings.md. If you rename a job, update branch protection.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same branch — saves CI minutes during
# rapid agent iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  types:
    name: Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      APP_URL: https://example.com
      DATABASE_URL: postgres://x:x@localhost:5432/x
      SESSION_SECRET: "00000000000000000000000000000000"
      POSTMARK_SERVER_TOKEN: dummy
      POSTMARK_INBOUND_WEBHOOK_SECRET: dummy
      CRON_SECRET: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  # Evals: regression suite for the AI agent. PRs that regress evals don't merge.
  # Disable this job until you have ≥20 eval tasks in evals/tasks/ (see brief, Pillar 5).
  evals:
    name: Evals
    runs-on: ubuntu-latest
    if: false # flip to `true` once evals/tasks/ has ≥20 tasks
    steps:
      - uses: actions/checkout@v4
      - name: Run evals
        run: echo "TODO — your eval runner"

  # Secret scan — defence in depth. GitHub also scans on push, but this
  # blocks the merge if the push scan was bypassed.
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
